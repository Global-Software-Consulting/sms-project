---
# ============================================
# SMS Sort Frontend — Server Provisioning
# ============================================
# Full server setup for deploying to a NEW server.
# Skip this if deploying to the same server as sms-api
# (that server already has Docker, Node, PM2, etc.)
#
# Usage:
#   ansible-playbook playbook.yml --ask-pass          # run
#   ansible-playbook playbook.yml --ask-pass --check   # dry run
#
# What gets installed:
#   - System essentials (curl, git, wget, etc.)
#   - Docker + Docker Compose v2
#   - Node.js 22 LTS
#   - PM2 (process manager)
#   - Nginx (reverse proxy)
#   - 2GB Swap
# ============================================

- name: Provision SMS Sort Frontend server
  hosts: sms_servers
  become: true

  vars:
    node_version: "22"
    swap_size: "2G"

  tasks:
    # ------------------------------------------
    # System
    # ------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install system essentials
      apt:
        name:
          - curl
          - wget
          - git
          - unzip
          - ca-certificates
          - gnupg
        state: present

    # ------------------------------------------
    # Docker + Compose
    # ------------------------------------------
    - name: Install Docker engine and Compose plugin
      apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Enable Docker service on boot
      systemd:
        name: docker
        state: started
        enabled: true

    # ------------------------------------------
    # Node.js 22 LTS
    # ------------------------------------------
    - name: Add NodeSource GPG key
      apt_key:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        state: present

    - name: Add NodeSource repository
      apt_repository:
        repo: "deb https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        state: present
        filename: nodesource

    - name: Install Node.js {{ node_version }}
      apt:
        name: nodejs
        state: present
        update_cache: true

    # ------------------------------------------
    # PM2
    # ------------------------------------------
    - name: Install PM2 globally
      npm:
        name: pm2
        global: true
        state: present

    # ------------------------------------------
    # Nginx
    # ------------------------------------------
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Enable Nginx service on boot
      systemd:
        name: nginx
        state: started
        enabled: true

    # ------------------------------------------
    # Swap (server has 0 by default)
    # ------------------------------------------
    - name: Check if swap is active
      command: swapon --show
      register: swap_check
      changed_when: false

    - name: Create {{ swap_size }} swap file
      command: fallocate -l {{ swap_size }} /swapfile
      when: swap_check.stdout == ""

    - name: Secure swap file permissions
      file:
        path: /swapfile
        mode: "0600"
      when: swap_check.stdout == ""

    - name: Format swap file
      command: mkswap /swapfile
      when: swap_check.stdout == ""

    - name: Activate swap
      command: swapon /swapfile
      when: swap_check.stdout == ""

    - name: Persist swap across reboots
      lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
      when: swap_check.stdout == ""
