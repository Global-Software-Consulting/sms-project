# BestSMSHQ — Nginx Reverse Proxy
# SSL terminated at Cloudflare — Nginx listens on port 80 only.
#
# Copy to server:
#   scp sms-frontend.conf root@194.163.128.98:/etc/nginx/sites-available/
#   ssh root@194.163.128.98 "ln -sf /etc/nginx/sites-available/sms-frontend.conf /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx"

# Frontend — app.bestsmshq.com → localhost:3001
server {
    listen 80;
    server_name app.bestsmshq.com;

    # Next.js App Router sends large request headers on RSC navigation
    # (Next-Router-State-Tree, Next-Router-Prefetch, _rsc query param,
    # plus cookies). Nginx defaults (8k buffer / 4 x 8k large buffers)
    # truncate these on deeply-nested routes or accounts with many
    # cookies, which causes the router to fall back to a hard reload
    # or silently fail mid-transition. Bump the limits so the full
    # header set always fits.
    large_client_header_buffers 4 32k;
    client_header_buffer_size 16k;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Forward the Vary header from upstream so caches (Cloudflare,
        # browser) key RSC and HTML responses correctly. Without this,
        # Cloudflare can serve an HTML body in response to an RSC
        # request (or vice-versa) on revisit, hanging the router.
        proxy_pass_header Vary;
    }
}
