# BestSMSHQ — Nginx Reverse Proxy
# SSL terminated at Cloudflare — Nginx listens on port 80 only.
#
# Copy to server:
#   scp sms-frontend.conf root@194.163.128.98:/etc/nginx/sites-available/
#   ssh root@194.163.128.98 "ln -sf /etc/nginx/sites-available/sms-frontend.conf /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx"
#
# Cache directory must exist before reload:
#   ssh root@194.163.128.98 "mkdir -p /var/cache/nginx/next && chown www-data:www-data /var/cache/nginx/next"

# Next.js RSC + static prefetch cache. Replaces the Vercel edge cache
# layer so that prefetch payloads served on every <Link> hover don't
# wake the Node server.
proxy_cache_path /var/cache/nginx/next levels=1:2 keys_zone=NEXT_CACHE:10m
                 max_size=1g inactive=60m use_temp_path=off;

# Frontend — app.bestsmshq.com → localhost:3001
server {
    listen 80;
    server_name app.bestsmshq.com;

    # Next.js App Router sends large request headers on RSC navigation
    # (Next-Router-State-Tree, Next-Router-Prefetch, _rsc query param,
    # plus cookies). Nginx defaults (8k buffer / 4 x 8k large buffers)
    # truncate these on deeply-nested routes or accounts with many
    # cookies, which causes the router to fall back to a hard reload
    # or silently fail mid-transition.
    large_client_header_buffers 4 32k;
    client_header_buffer_size 16k;

    # Compress text-ish responses (RSC payloads are served as
    # text/x-component; HTML and JSON are typical too). gzip cuts RSC
    # prefetch size 5-10x and lets the framework arrive before the
    # user clicks the next link.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # Static assets and RSC prefetch payloads — safe to cache at the
    # edge. _next/static is content-hashed (immutable for one build);
    # _next/data RSC payloads are page-keyed and can be served stale
    # while the framework regenerates on the next request.
    location ~* ^/_next/(static|data|image)/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache NEXT_CACHE;
        proxy_cache_valid 200 60m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating
                               http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_revalidate on;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        # Keep upstream keepalive connections hot. The upgrade headers
        # we used to set here are not needed — sms-frontend has no
        # websocket endpoints (the admin socket runs on the api.
        # subdomain). Empty Connection lets nginx reuse the pooled
        # upstream connection across requests.
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Forward the Vary header from upstream so caches (Cloudflare,
        # browser) key RSC and HTML responses correctly. Without this,
        # Cloudflare can serve an HTML body in response to an RSC
        # request (or vice-versa) on revisit, hanging the router.
        proxy_pass_header Vary;

        # Disable response buffering so streamed RSC payloads flush to
        # the client as the framework writes them. Buffering on holds
        # the response until nginx fills its buffer, which delays
        # prefetch arrival — directly causes the "click before RSC
        # loads = stuck navigation" symptom.
        proxy_buffering off;

        # Allow long-lived RSC streams. Default 60s is enough for HTML
        # but tight for streamed payloads on slower connections.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
    }
}
