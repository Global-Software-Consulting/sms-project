# BestSMSHQ — Nginx Reverse Proxy (Frontend, app.bestsmshq.com)
#
# Deployment model:
#   - Cloudflare in front (proxied), SSL terminated at the origin
#     using a Cloudflare Origin Certificate.
#   - Cloudflare → Contabo origin over HTTP/2 on 443.
#   - Origin Node app listens on 127.0.0.1:3001 (docker-compose).
#
# Apply on server:
#   scp sms-frontend.conf root@194.163.128.98:/etc/nginx/sites-available/
#   ssh root@194.163.128.98 "nginx -t && systemctl reload nginx"
#
# Diff before reload is recommended:
#   ssh root@194.163.128.98 "diff /etc/nginx/sites-available/sms-frontend.conf -" < sms-frontend.conf

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    server_name app.bestsmshq.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.bestsmshq.com;

    ssl_certificate /etc/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cloudflare IP ranges — restore real client IP for logs / rate
    # limiting / app-level access decisions.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Next.js App Router sends large request headers on RSC navigation
    # (Next-Router-State-Tree, Next-Router-Prefetch, _rsc query param,
    # plus cookies). Nginx defaults (8k buffer / 4 x 8k large buffers)
    # truncate these on deeply-nested routes or cookie-heavy users,
    # causing silent router fallback to hard reload.
    large_client_header_buffers 4 32k;
    client_header_buffer_size 16k;

    # Compress text-ish responses, including the RSC payload
    # (text/x-component). 5-10x smaller payloads land before the
    # user can click the next link — direct mitigation for the
    # "click before prefetch arrives = stuck nav" symptom.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        # Forward Vary from upstream so Cloudflare / browser caches
        # key RSC and HTML responses correctly. Without this, the
        # same URL can return an HTML body to an RSC request on
        # revisit, hanging the router.
        proxy_pass_header Vary;

        # CRITICAL — these three fix the streaming RSC bug
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        add_header Cache-Control "no-transform" always;

        # Bump timeouts — 30s was too short and could kill long RSC streams
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
