name: Deploy Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-and-push:
    name: Build & Push Image
    needs: lint-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=prod

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_FORCE_FULL_NAV=true

  deploy-prod:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: 'docker-compose.prod.yml'
          target: '~/sms-frontend/'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # Bumped from 5m. On slow image-pull days the prior 5m budget
          # was killing the script mid-recreate (before the in-script
          # health check + rollback logic could run), leaving prod in
          # an unverified state and no rollback.
          command_timeout: 15m
          # Sourcing ENV_DEV here (not ENV_PROD) because the previous
          # dev.yml workflow already populated ENV_DEV with the values
          # that serve the production domain. Switch to ENV_PROD once
          # that secret has been populated separately. The downstream
          # script uses APP_ENV regardless of which GH secret backs it.
          envs: ENV_DEV,GHCR_TOKEN
          script: |
            set -e
            APP_ENV="$ENV_DEV"

            # Fail-fast env validation. Frontend has no fatal-on-missing
            # runtime keys today (NEXT_PUBLIC_API_URL is baked in at build,
            # NODE_ENV + PORT are pinned in docker-compose.prod.yml). The
            # check below is a scaffold for future additions — extend
            # REQUIRED_KEYS when the app starts depending on runtime
            # secrets that crash startup if absent. Mirrors sms-api PR #38.
            REQUIRED_KEYS=()
            MISSING=()
            for key in "${REQUIRED_KEYS[@]}"; do
              if ! printf '%s\n' "$APP_ENV" | grep -q "^${key}="; then
                MISSING+=("$key")
              fi
            done
            if [ ${#MISSING[@]} -gt 0 ]; then
              echo "::error::Secret is missing required keys: ${MISSING[*]}"
              echo "::error::Update the ENV_DEV (or ENV_PROD) GitHub Actions secret and re-run the deploy."
              echo "::error::No container changes have been made; the previous deploy remains active."
              exit 1
            fi
            echo "::notice::env validation passed (${#REQUIRED_KEYS[@]} required keys checked)"

            # Disk usage check
            DISK_USAGE=$(df / --output=pcent | tail -1 | tr -d ' %')
            if [ "$DISK_USAGE" -ge 90 ]; then
              echo "BLOCKED: Disk usage at ${DISK_USAGE}% — deployment aborted"
              exit 1
            elif [ "$DISK_USAGE" -ge 80 ]; then
              echo "WARNING: Disk usage at ${DISK_USAGE}%"
            fi

            cd ~/sms-frontend

            # Save current image for rollback
            docker inspect --format='{{.Config.Image}}' sms_frontend_prod 2>/dev/null > ~/sms-frontend/.previous-image || echo "none" > ~/sms-frontend/.previous-image

            # Env to tmpfs (RAM only)
            mkdir -p /dev/shm/sms-frontend
            printf '%s\n' "$APP_ENV" > /dev/shm/sms-frontend/.env
            chmod 600 /dev/shm/sms-frontend/.env

            # One-time cutover guard: if the legacy sms_frontend_dev container
            # is still running on this host (from the old dev.yml workflow that
            # used to deploy to the production domain), stop and remove it
            # before bringing up the prod compose. Both compose files bind
            # host port 3001, so a leftover dev container would block the
            # prod container from binding the port and the deploy would fail.
            # Safe to leave permanently — no-ops once the dev container is gone.
            if docker ps -a --format '{{.Names}}' | grep -q '^sms_frontend_dev$'; then
              echo "Found legacy sms_frontend_dev container — stopping and removing"
              docker compose -f docker-compose.dev.yml down 2>/dev/null || docker rm -f sms_frontend_dev
            fi

            # Pull and restart
            # GHCR rejects mixed-case repository names but github.repository
            # preserves the org casing (Global-Software-Consulting/...). The
            # build job's docker/metadata-action lowercases automatically when
            # pushing; here we lowercase explicitly before pulling.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE="${{ env.REGISTRY }}/$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]'):prod"
            docker pull "$IMAGE"

            # Symlink env so compose env_file: .env resolves correctly
            ln -sf /dev/shm/sms-frontend/.env ~/sms-frontend/.env
            docker compose -f docker-compose.prod.yml up -d --no-build

            # Cleanup: remove symlink and tmpfs env after container reads it
            rm -f ~/sms-frontend/.env /dev/shm/sms-frontend/.env

            # Health check with retries — rollback only fires after ALL 5
            # attempts fail (≈50s wait + curl time). Visible attempt counter
            # so the GH Actions log makes it obvious how many tries happened
            # before any rollback decision.
            echo "Waiting for container to be healthy (max 5 attempts, ~50s)..."
            for i in 1 2 3 4 5; do
              sleep 10
              if curl -sf http://localhost:3001/ > /dev/null 2>&1; then
                echo "::notice::✓ Health check passed on attempt $i/5"
                break
              fi
              echo "  Health check attempt $i/5 failed, retrying in 10s..."
              if [ $i -eq 5 ]; then
                echo "::error::Health check failed after 5/5 attempts — preparing rollback"
                docker logs sms_frontend_prod --tail 50
                
                # Rollback to previous image
                echo "::error::Deployment failed - initiating rollback..."
                PREVIOUS_IMAGE=$(cat ~/sms-frontend/.previous-image)
                if [ "$PREVIOUS_IMAGE" != "none" ]; then
                  echo "Rolling back to previous image: $PREVIOUS_IMAGE"
                  docker compose -f docker-compose.prod.yml down
                  docker pull $PREVIOUS_IMAGE 2>/dev/null || echo "Previous image not found in registry, using local"
                  IMAGE_TAG=$PREVIOUS_IMAGE docker compose -f docker-compose.prod.yml up -d
                  
                  # Verify rollback health
                  sleep 10
                  if curl -sf http://localhost:3001/ > /dev/null 2>&1; then
                    echo "::notice::✓ Rollback successful - service restored"
                  else
                    echo "::error::✗ Rollback failed - service still unhealthy"
                  fi
                else
                  echo "::error::No previous image available for rollback"
                fi
                exit 1
              fi
            done

            docker image prune -f
        env:
          # ENV_DEV is the production env secret today (see the comment
          # on the `envs:` field above for context). When ENV_PROD becomes
          # the source of truth, swap this line + the envs: line + the
          # APP_ENV assignment in the script.
          ENV_DEV: ${{ secrets.ENV_DEV }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
