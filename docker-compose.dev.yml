# Development Stack
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f app

services:
  app:
    image: ${IMAGE_TAG:-ghcr.io/global-software-consulting/sms-project:develop}
    container_name: sms_frontend_dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    # Force NODE_ENV=production at runtime so Next.js + React run their
    # production code paths. The image is built with `next build`, but
    # the .env file (sourced from the ENV_DEV CI secret) historically
    # contained NODE_ENV=development which overrode the Dockerfile's
    # ENV NODE_ENV=production and caused next start to behave in
    # development mode — including the symptom of first-click route
    # transitions never committing on production. Setting it here
    # under `environment:` takes precedence over env_file values.
    environment:
      NODE_ENV: production
      # Pin the port too. The .env from the ENV_DEV secret contains
      # PORT=3000, which overrode the Dockerfile's ENV PORT=3001 once we
      # switched from `next start -p 3001` (CLI flag, env-immune) to the
      # custom server.js (reads process.env.PORT). Without this pin the
      # server boots on 3000 while compose maps/health-checks 3001 —
      # health check fails and the deploy rolls back.
      PORT: 3001
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
